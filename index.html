        <img src="androidphone.webp" alt="Android Phone">

    <p>₹50000</p>
    <button onclick="addToCart()">Add to Cart</button>
    </div>
    <div class="product">
        <img src="iphone.webp" alt="Apple phone">

    <p>₹150000</p>

    </div>
